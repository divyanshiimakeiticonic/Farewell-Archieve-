<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Farewell III</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#111;

    display:flex;
    justify-content:center;

    min-height:100vh;

    font-family:'Cinzel', serif;
}

.phone-frame{

    width:390px;
    min-height:100vh;

    background:url('bg3.png');
    background-size:cover;
    background-position:center;

    padding:28px 16px 40px;

    position:relative;

    overflow:hidden;
}

.heading{

    text-align:center;

    font-size:28px;

    color:#415870;

    margin-bottom:20px;
}

.collage{

    position:relative;

    height:980px;

    margin-top:10px;
}

.photo{

    position:absolute;

    background:white;

    padding:7px;

    border-radius:12px;

    box-shadow:0 8px 24px rgba(0,0,0,0.18);
}

.photo img{

    width:100%;

    border-radius:8px;

    display:block;
}

.p1{

    width:60%;

    top:20px;
    left:0;

    transform:rotate(-4deg);
}

.p2{

    width:50%;

    top:30px;
    right:0;

    transform:rotate(4deg);
}

.p3{

    width:70%;

    top:300px;
    left:10px;

    transform:rotate(-3deg);
}

.p4{

    width:48%;

    top:410px;
    right:0;

    transform:rotate(5deg);
}

.p6{

    width:48%;

    top:410px;
    left:4%;

    transform:rotate(5deg);
}

.p5{

    width:82%;

    top:590px;

    left:50%;

    transform:translateX(-50%) rotate(-2deg);
}

.tag{

    position:absolute;

    font-family:'Poppins', sans-serif;

    font-size:22px;

    font-weight:700;

    letter-spacing:1px;

    color:#3c556c;
}

.tag1{

    top:250px;
    left:14px;
}

.tag2{

    top:550px;
    left:14px;
}

.btn{

    display:block;

    width:fit-content;

    margin:18px auto 0;

    padding:10px 18px;

    border-radius:30px;

    text-decoration:none;

    color:white;

    background:#5a738d;

    letter-spacing:2px;

    font-size:12px;
}

</style>
</head>
<body>

<div class="phone-frame">

    <div class="heading">
   
    </div>

    <div class="collage">

        <div class="tag tag1">
            #BestPoseKingg
        </div>

        <div class="tag tag2">
            #ThisWasUs
        </div>

        <div class="photo p1">
            <img src="pk2.png">
        </div>

        <div class="photo p2">
            <img src="pk1.png">
        </div>

        <div class="photo p3">
            <img src="kw2.jpg">
        </div>

        <div class="photo p4">
            <img src="kw1.png">
        </div>

        <div class="photo p5">
            <img src="grppic.png">
        </div>

        <div class="photo p6">
            <img src="cbm1.jpg">
        </div>

    </div>

    <a href="teachers1.html" class="btn">
        continue →
    </a>

</div>

</body>
</html>
