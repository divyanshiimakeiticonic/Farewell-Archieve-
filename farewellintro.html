<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Farewell Archives</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#000;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;

    font-family:'Cormorant Garamond', serif;
}

/* phone layout */

.phone-frame{

    position:relative;

    width:100%;
    max-width:390px;

    height:100vh;

    overflow:hidden;

    background:black;
}

/* video */

video{

    position:absolute;

    inset:0;

    width:100%;
    height:100%;

    object-fit:cover;
}

/* dark overlay */

.overlay{

    position:absolute;

    inset:0;

    background:rgba(0,0,0,0.32);
}

/* text section */

.intro{

    position:absolute;

    bottom:10%;

    left:50%;

    transform:translateX(-50%);

    width:85%;

    text-align:center;

    color:white;

    opacity:0;

    animation:fadeIn 1.7s ease forwards;

    animation-delay:4.3s;
}

/* heading */

.intro h1{

    font-family:Cormorant Garamond', serif;

    font-size:52px;

    font-weight:400;

    line-height:1.05;

    margin-bottom:10px;

    text-shadow:0 4px 18px rgba(0,0,0,0.4);
}

/* subtitle */

.intro p{

    font-size:12px;

    letter-spacing:4px;

    margin-bottom:22px;
}

/* button */

.btn{

    display:inline-block;

    padding:11px 22px;

    border-radius:30px;

    text-decoration:none;

    color:white;

    font-size:14px;

    border:1px solid rgba(255,255,255,0.35);

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(6px);

    transition:0.3s ease;
}

.btn:hover{
    transform:scale(1.05);
}

/* animation */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateX(-50%) translateY(18px);
    }

    to{
        opacity:1;
        transform:translateX(-50%) translateY(0);
    }

}

</style>
</head>

<body>

<div class="phone-frame">

    <video autoplay muted playsinline>
        <source src="farewellintro.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="intro">

        <h1>FAREWELL DAY</h1>

        <p>#CoreMemory!</p>

        <a href="farewell1.html" class="btn">
            CONTINUE →
        </a>

    </div>

</div>

</body>
</html>
