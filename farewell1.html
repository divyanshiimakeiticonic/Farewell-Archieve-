
<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Farewell I</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;500;600&family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#111;

    display:flex;
    justify-content:center;

    min-height:100vh;

    font-family:'Bodoni Moda', serif;
}

.phone-frame{

    position:relative;

 width:430px;
height:772px;

    overflow-y:auto;

    background-image:url('bg1.png');
    background-size:cover;
    background-position:center;

    border-radius:32px;

    padding:28px 16px 40px;

    box-shadow:0 10px 40px rgba(0,0,0,0.35);
}

.heading{

    text-align:center;

    font-size:34px;

    color:#5d4331;

    margin-bottom:24px;
}

.collage{

    position:relative;

    height:780px;

    margin-top:10px;
}

.photo{

    position:absolute;

    background:white;

    padding:7px;

    border-radius:12px;

    box-shadow:0 8px 24px rgba(0,0,0,0.18);
}

.photo img{

    width:100%;

    border-radius:8px;

    display:block;
}

.p1{

    width:55%;

    top:0;
    left:0;

    transform:rotate(-4deg);
}

.p2{

    width:63%;

    top:100px;
    RIGHT:0;

    transform:rotate(4deg);
}

.p5{

    width:66%;

    top:210px;
    right:12px;
    left:50px;
    transform:rotate(-2deg);
}

.p3{

    width:50%;

    top:360px;
    left:10px;

    transform:rotate(-3deg);
}

.p4{

    width:46%;

    top:420px;
    right:0;

    transform:rotate(3deg);
}

.tag{

    position:absolute;

    font-family:'Poppins', sans-serif;

    font-size:22px;

    font-weight:700;

    letter-spacing:1px;

    color:#5f4a3a;
}

.tag1{

    top:330px;
    left:18px;
}

.tag2{

    top:620px;
    right:50px;
}
.tag3{

    top:60px;
    right:-8px;
    font-size:18px;

    transform:rotate(4deg);
}



.btn{

    position:absolute;

    bottom:0px;

    left:50%;

    transform:translateX(-50%);

    padding:10px 22px;

    border-radius:30px;

    text-decoration:none;

    background:rgba(255,255,255,0.18);

    backdrop-filter:blur(8px);

    color:white;

    font-size:13px;

    letter-spacing:2px;

    border:1px solid rgba(255,255,255,0.28);

    box-shadow:0 4px 18px rgba(0,0,0,0.18);

    z-index:20;
}


</style>
</head>
<body>

<div class="phone-frame">

    <div class="heading">
        THE CELEBRATION.
    </div>

    <div class="collage">

        <div class="tag tag1">
            #MandatoryClicks
        </div>

        <div class="tag tag2">
            #oneLastCelebration
        </div>
        
        <div class="tag tag3">
            #MainCharacters
        </div>


        <div class="photo p1">
            <img src="grp1.jpg">
        </div>

        <div class="photo p2">
            <img src="grp2.jpg">
        </div>

        <div class="photo p5">
            <img src="grp3.jpg">
        </div>

        <div class="photo p3">
            <img src="cc1.png">
        </div>

        <div class="photo p4">
            <img src="cc2.png">
        </div>

    </div>

    <a href="farewell2.html" class="btn">
        continue →
    </a>

</div>

</body>
</html>
