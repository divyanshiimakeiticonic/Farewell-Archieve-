<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Who's Watching?</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Great+Vibes&family=Cookie&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#111;

    font-family:'Poppins', sans-serif;
}

/* PHONE */

.phone-frame{

    width:390px;
    height:844px;

    position:relative;

    overflow:hidden;

    background:
    linear-gradient(rgba(12,16,32,0.55), rgba(12,16,32,0.72)),
    url('watchingbg.png');

    background-size:cover;
    background-position:center;
}

/* GLOW */

.phone-frame::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    radial-gradient(circle at top,
    rgba(255,255,255,0.10),
    transparent 45%);

    pointer-events:none;
}

/* FLOAT */

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* CONTENT */

.content{

    position:absolute;

    top:50%;

    left:10%;

    transform:translate(-50%,-50%);

    width:82%;

    text-align:center;

    color:white;

    animation:float 5s ease-in-out infinite;
}

/* SMALL TEXT */

.small{

    font-size:14px;

    letter-spacing:4px;

    opacity:0.72;

    margin-bottom:16px;
}

/* TITLE */

.title{

    font-family:'Great Vibes', cursive;

    font-size:58px;

    line-height:1.1;

    margin-bottom:18px;

    text-shadow:
    0 4px 18px rgba(0,0,0,0.45);
}

/* SUBTEXT */

.sub{

    font-size:15px;

    line-height:1.7;

    opacity:0.88;

    margin-bottom:34px;
}

/* SELECT */

select{

    width:100%;

    padding:16px 18px;

    border:none;

    outline:none;

    border-radius:18px;

    background:
    rgba(255,255,255,0.16);

    backdrop-filter:blur(10px);

    color:white;

    font-size:15px;

    cursor:pointer;

    border:1px solid rgba(255,255,255,0.22);

    box-shadow:
    0 8px 24px rgba(0,0,0,0.24);
}

/* OPTION */

option{

    color:black;
}

/* STARS */

.star{

    position:absolute;

    color:white;

    opacity:0.7;

    animation:float 4s ease-in-out infinite;
}

.s1{
    top:120px;
    left:28px;
    font-size:18px;
}

.s2{
    top:190px;
    right:32px;
    font-size:22px;

    animation-delay:1s;
}

.s3{
    bottom:160px;
    left:30px;
    font-size:20px;

    animation-delay:2s;
}

.s4{
    bottom:230px;
    right:35px;
    font-size:16px;

    animation-delay:1.5s;
}

.enter-btn{

    margin-top:22px;

    padding:12px 28px;

    border:none;

    border-radius:30px;

    background:
    rgba(255,255,255,0.18);

    backdrop-filter:blur(10px);

    color:white;

    font-size:14px;

    letter-spacing:2px;

    cursor:pointer;

    border:1px solid rgba(255,255,255,0.24);

    box-shadow:
    0 8px 24px rgba(0,0,0,0.22);

    transition:0.3s;
}

.enter-btn:hover{

    transform:scale(1.04);

    background:
    rgba(255,255,255,0.24);
}

</style>
</head>

<body>

<div class="phone-frame">

    <!-- STARS -->

    <div class="star s1">✦</div>
    <div class="star s2">★</div>
    <div class="star s3">✦</div>
    <div class="star s4">★</div>

    <!-- CONTENT -->

    <div class="content">

        <div class="small">
            FAREWELL 2026
        </div>

        <div class="title">
            who's watching?
        </div>

        <div class="sub">
            you've made it till here. <br>
            now collect your hashtag ✨
        </div>

        <select id="viewer">

    <option selected disabled>
        select your name
    </option>

    <option value="AdityaPratapSingh.html">
        Aditya
    </option>

    <option value="AkshatSharma.html">
        Akshat
    </option>

    <option value="DD.html">
        DD
    </option>

    <option value="HarshitaR.html">
        Harshita R.
    </option>

    <option value="HarshitaS.html">
        Harshita S.
    </option>

    <option value="Joga.html">
        Joga
    </option>

    <option value="RohitRahi.html">
        Rohit
    </option>

    <option value="TanuMasram.html">
        Tanu
    </option>

</select>

<button class="enter-btn" onclick="goPage()">
    enter →
</button>

    </div>

</div>

<script>

function goPage(){

    let person =
    document.getElementById("viewer").value;

    window.location.href = person;
}

</script>

</body>
</html>
