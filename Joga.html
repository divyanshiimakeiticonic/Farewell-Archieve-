<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Joga Singh</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Cookie&family=Great+Vibes&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#111;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;

    font-family:'Poppins', sans-serif;
}

.phone-frame{

    width:390px;
    height:844px;

    position:relative;

    overflow:hidden;

    background:url('jogabg.jpg');
    background-size:cover;
    background-position:center;
}

/* FLOATING */

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0px);
    }
}

@keyframes floatTilt{

    0%{
        transform:translateY(0px) rotate(-6deg);
    }

    50%{
        transform:translateY(-6px) rotate(-4deg);
    }

    100%{
        transform:translateY(0px) rotate(-6deg);
    }
}

/* STARS */

.star{

    position:absolute;

    font-size:20px;

    color:white;

    opacity:1.00;

    animation:float 4s ease-in-out infinite;
}

.s1{
    top:90px;
    left:18px;
}

.s2{
    top:185px;
    right:20px;

    animation-delay:1s;
}

.s3{
    bottom:240px;
    left:22px;

    animation-delay:2s;
}

.s4{
    bottom:190px;
    right:25px;

    animation-delay:1.5s;
}

/* HASHTAG */

.hashtag{

    position:absolute;

    top:155px;

    width:100%;

    text-align:center;

    font-family:'Cookie', cursive;

    font-size:47px;

    color:white;

    z-index:8;

    text-shadow:0 4px 12px rgba(0,0,0,0.32);

    animation:float 5s ease-in-out infinite;
}

/* NAME */

.name{

    position:absolute;

    top:100px;

    width:100%;

    text-align:center;

    font-family:'Sacramento', cursive;

    font-size:34px;

    color:white;

    z-index:8;

    text-shadow:0 4px 10px rgba(0,0,0,0.28);

    animation:float 6s ease-in-out infinite;
}

/* MAIN CUTOUT */

.cutout{

    position:absolute;

    width:950px;

    left:0%;

    bottom:8px;

    transform:translateX(-50%);

    z-index:6;

    display:flex;

    justify-content:center;

    animation:float 5s ease-in-out infinite;
}

.cutout img{

    width:100%;

    object-fit:contain;

    transform:translateX(-168px);

    filter:
    drop-shadow(0 0 6px rgba(255,255,255,0.95))
    drop-shadow(0 0 14px rgba(255,255,255,0.75))
    drop-shadow(0 16px 26px rgba(0,0,0,0.28));
}

/* SIDE FRAMES */

.photo{

    position:absolute;

    width:84px;

    background:white;

    padding:5px;

    border-radius:12px;

    box-shadow:0 10px 24px rgba(0,0,0,0.18);

    z-index:2;
}

.photo img{

    width:100%;
    display:block;

    border-radius:8px;
}

/* POSITIONS */

.p1{

    top:185px;
    left:8px;

    transform:rotate(-7deg);

    animation:floatTilt 5s ease-in-out infinite;
}

.p2{

    top:225px;
    right:8px;

    transform:rotate(8deg);

    animation:floatTilt 6s ease-in-out infinite;
}

.p3{

    bottom:310px;
    left:6px;

    transform:rotate(-8deg);

    animation:floatTilt 5.5s ease-in-out infinite;
}

.p4{

    bottom:340px;
    right:6px;

    transform:rotate(7deg);

    animation:floatTilt 6.2s ease-in-out infinite;
}

/* TAPE */

.tape{

    position:absolute;

    width:40px;
    height:12px;

    background:rgba(255,255,255,0.42);

    border-radius:4px;

    top:-5px;
    left:18px;

    transform:rotate(-8deg);
}

/* SCRIBBLES */

.scribble{

    position:absolute;

    font-family:'Caveat', cursive;

    font-size:28px;

    color:white;

    opacity:0.92;

    z-index:8;

    text-shadow:0 4px 10px rgba(0,0,0,0.25);

    animation:float 4.5s ease-in-out infinite;
}

.sc1{

    top:340px;
    left:118px;

    transform:rotate(-6deg);
}

.sc2{

    bottom:220px;
    right:82px;

    transform:rotate(6deg);

    animation-delay:1s;
}

.btn{

    position:absolute;

    bottom:22px;

    left:50%;

    transform:translateX(-50%);

    padding:10px 22px;

    border-radius:30px;

    text-decoration:none;

    background:rgba(255,255,255,0.18);

    backdrop-filter:blur(8px);

    color:white;

    font-size:13px;

    letter-spacing:2px;

    border:1px solid rgba(255,255,255,0.28);

    box-shadow:0 4px 18px rgba(0,0,0,0.18);

    z-index:20;
}

</style>
</head>

<body>

<div class="phone-frame">

    <!-- STARS -->

    <div class="star s1">✦</div>
    <div class="star s2">★</div>
    <div class="star s3">✦</div>
    <div class="star s4">★</div>

    <!-- TITLE -->

    <div class="hashtag">
        #SilentSwagger
    </div>

    <div class="name">
        Joga Brar
    </div>

    <!-- SIDE FRAMES -->

    <div class="photo p1">

        <div class="tape"></div>

        <img src="joga1.jpg">

    </div>

    <div class="photo p2">

        <div class="tape"></div>

        <img src="joga2.png">

    </div>

    <div class="photo p3">

        <div class="tape"></div>

        <img src="joga3.jpg">

    </div>

    <div class="photo p4">

        <div class="tape"></div>

        <img src="joga4.jpg">

    </div>

    <!-- SCRIBBLES -->

    <div class="scribble sc1">
                       
    </div>

    <div class="scribble sc2">
      ♡
    </div>

    <div class="scribble sc3">
      ♡
    </div>
    <!-- MAIN CUTOUT -->

    <div class="cutout">
   

        <img src="jogacutout.png">

    </div>

   <div> 
   <a href="shivam.html" class="btn">
    next →
</a>

</div>

</body>
</html>
